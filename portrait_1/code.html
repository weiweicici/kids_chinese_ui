<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Mòshuǐ - 考考你</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#6b3900",
                        "secondary": "#8f4e00",
                        "primary": "#006b58",
                        "surface-tint": "#006b58",
                        "secondary-container": "#fc9d41",
                        "surface-container": "#e8efec",
                        "error": "#ba1a1a",
                        "background": "#f4fbf8",
                        "tertiary-container": "#7bb4ff",
                        "on-background": "#161d1b",
                        "on-primary-fixed": "#002019",
                        "on-primary": "#ffffff",
                        "surface": "#f4fbf8",
                        "primary-container": "#66c2aa",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#ffb77a",
                        "on-primary-fixed-variant": "#005142",
                        "outline-variant": "#bdc9c4",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#ebf2ef",
                        "surface-container-high": "#e3eae7",
                        "secondary-fixed": "#ffdcc2",
                        "on-secondary-fixed-variant": "#6d3a00",
                        "surface-bright": "#f4fbf8",
                        "on-primary-container": "#004e40",
                        "outline": "#6e7a75",
                        "surface-container-highest": "#dde4e1",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d4dcd9",
                        "on-tertiary-fixed-variant": "#004883",
                        "surface-container-low": "#eef5f2",
                        "primary-fixed": "#97f4da",
                        "on-tertiary-container": "#00457e",
                        "on-surface-variant": "#3e4945",
                        "inverse-surface": "#2b3230",
                        "tertiary-fixed-dim": "#a4c9ff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#7bd7be",
                        "primary-fixed-dim": "#7bd7be",
                        "tertiary-fixed": "#d4e3ff",
                        "tertiary": "#0060ac",
                        "on-tertiary-fixed": "#001c39",
                        "on-secondary-fixed": "#2e1500",
                        "surface-variant": "#dde4e1",
                        "on-surface": "#161d1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-grid": "24px",
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "margin-page": "40px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "display-character": ["Noto Serif"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "card-character": ["Noto Serif"],
                        "label-bold": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-character": ["120px", { "lineHeight": "140px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["18px", { "lineHeight": "26px", "fontWeight": "500" }],
                        "card-character": ["64px", { "lineHeight": "80px", "fontWeight": "500" }],
                        "label-bold": ["16px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "800" }],
                        "body-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Shared Components JSON instructions */
        .top-app-bar-brand { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; color: #006b58; }
        .top-app-bar-container { background-color: rgba(244, 251, 248, 0.8); backdrop-filter: blur(4px); }
        .nav-active { color: #006b58; font-weight: 700; border-bottom: 2px solid #006b58; }
        .nav-inactive { color: #3e4945; font-weight: 500; }
        
        /* Custom Flashcard Styles */
        body { background-color: #f4fbf8; overflow: hidden; }
        .tactile-button {
            border-bottom: 4px solid rgba(0, 78, 64, 0.3);
            transition: all 0.1s ease;
        }
        .tactile-button:active {
            border-bottom: 0px solid rgba(0, 78, 64, 0.3);
            transform: translateY(4px);
        }
        .flashcard-shadow {
            box-shadow: 0 20px 40px rgba(0, 107, 88, 0.08), 0 1px 3px rgba(0, 107, 88, 0.05);
        }
        .mic-shadow {
            box-shadow: 0 10px 25px rgba(102, 194, 170, 0.4);
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen flex flex-col items-center justify-between" style="aspect-ratio: 3/4; max-width: 768px; max-height: 1024px; margin: 0 auto;">
<!-- TopAppBar -->
<header class="flex justify-between items-center h-20 px-6 w-full z-50 top-app-bar-container top-0 docked full-width flat no shadows">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-tertiary-container text-4xl" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<h1 class="top-app-bar-brand text-2xl">考考你</h1>
</div>
<div class="flex items-center gap-2">
<button class="bg-primary-container text-on-primary font-label-bold text-sm py-2 px-4 rounded-xl tactile-button hover:bg-primary-container/90">
                下一张
            </button>
<button class="bg-primary-container text-on-primary font-label-bold text-sm py-2 px-4 rounded-xl tactile-button hover:bg-primary-container/90">
                开始
            </button>
<button class="bg-primary-container text-on-primary font-label-bold text-sm py-2 px-4 rounded-xl tactile-button hover:bg-primary-container/90">
                返回
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full flex flex-col items-center justify-center relative px-margin-page gap-8">
<!-- Giant Flashcard -->
<div class="w-[400px] h-[400px] bg-surface-container-lowest rounded-[40px] flashcard-shadow flex items-center justify-center relative z-10">
<span class="font-display-character text-[180px] leading-none text-on-background">大</span>
</div>
<!-- Audio Control / Mic Button -->
<button class="z-20 w-28 h-28 bg-[#70cfc2] rounded-full mic-shadow flex items-center justify-center tactile-button border-b-[6px] border-[#005142]/20">
<span class="material-symbols-outlined text-surface-container-lowest text-6xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</main>
<!-- Bottom Evaluation Toolbar -->
<footer class="w-full h-[120px] bg-surface-container flex items-center justify-center gap-stack-lg px-margin-page shadow-[0_-4px_20px_rgba(0,107,88,0.08)] z-50">
<!-- Cross / Wrong Button -->
<button class="w-16 h-16 rounded-full bg-error-container text-on-error-container flex items-center justify-center tactile-button border-b-[3px] border-error/20">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">close</span>
</button>
<!-- Compare Pronunciation Button -->
<button class="h-16 px-10 rounded-2xl bg-primary-container text-on-primary font-headline-md text-headline-md flex items-center justify-center gap-2 tactile-button w-[240px]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">record_voice_over</span>
            比一比
        </button>
<!-- Check / Correct Button -->
<button class="w-16 h-16 rounded-full bg-primary text-on-primary flex items-center justify-center tactile-button border-b-[3px] border-on-primary-fixed-variant/40">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</footer>
</body></html>
