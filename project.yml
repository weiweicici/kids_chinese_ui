name: ChineseApp
options:
  bundleIdPrefix: com.kids
targets:
  ChineseApp:
    type: application
    platform: iOS
    deploymentTarget: "9.0"
    sources:
      - path: src
      - path: Textbooks
        type: folder
      - path: ChineseWordmp3
        type: folder
    settings:
      base:
        INFOPLIST_FILE: src/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kids.ChineseApp
        IPHONEOS_DEPLOYMENT_TARGET: "9.0"
        TARGETED_DEVICE_FAMILY: "2" # iPad only
        ENABLE_BITCODE: NO
        ARCHS: "armv7 arm64"
        VALID_ARCHS: "armv7 arm64"
